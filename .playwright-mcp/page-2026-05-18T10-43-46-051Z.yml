      - generic [ref=e394]:
        - generic [ref=e395]:
          - heading "角色简介" [level=3] [ref=e396]
          - textbox "写下对您的角色的概括性介绍，包括他们的过去、经历和个性特征。请注意，角色真正的性格和背景特质应当在游戏中体现出来，这里只是简短的概括和提示。" [ref=e398]: 阿德兰来自一个被称为风港群岛的海上文明。诸岛被永不停息的风暴隔开，普通船只很难安全往来。于是，各岛之间往来都依靠一种特殊的职业:飞行者。阿德兰出生在银翼家族，长大后自然而然地成为了飞行者。 但是世界并非孤立的岛屿，突然爆发的战争最终波及到了这里，一时间人心惶惶。群岛大法师发出预言，只要寻找到希望之心，就能渡过这场灾祸。 从战争爆发开始，每一年都有一批相同年龄的飞行者前往茫茫大海。从20号开始，到阿德兰时，已经是24号远征队了。
        - generic [ref=e399]:
          - heading "角色特质" [level=3] [ref=e400]
          - textbox "写下您的角色的性别、年龄、外貌和服装等外观特征。如果您的角色有什么特征或者与众不同之处，也可以记录在这里。" [ref=e402]: 飞行者不仅是一份职业，对他来说，帮助别人也让他很有成就感。他活泼开朗，努力训练，大家都亲切地称呼他为“小太阳”。 他有着一头金色的头发和碧蓝的眼睛，当他开始工作时，背后会凝聚出一对洁白而巨大的羽翼，这是他作为神使的标志性能力。 但是战争开始后，他感到深深的无力。每年，那些比他年长，曾经教导过他的朋友与兄长，都再也没有回来。当他出发时，他的心中也满怀迷惘...
