name = "dhol-realtime"
main = "src/index.ts"
compatibility_date = "2026-04-28"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject"]

# 生产环境必须设置 ALLOWED_ORIGIN，值为前端域名（如 https://dhol.pages.dev）
# 在 Cloudflare Dashboard > Workers & Pages > dhol-realtime > Settings > Variables 中添加
# [vars]
# ALLOWED_ORIGIN = "https://dhol.pages.dev"

# Bind this after creating the D1 database:
# [[d1_databases]]
# binding = "DHGC_DB"
# database_name = "dhgc"
# database_id = "<replace-with-d1-id>"

